<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="base:app_id" content="6a254bd0582e63b338c2683c" />
<meta name="talentapp:project_verification" content="4e019a6fb4ab9ee7d13a561e04eae11490dde7d87086f51a6306e1a754f9342b1912b805a229f92a1ccb6a74768605d4abf3211d567d9b58b35d4a131b88f5d8">
<title>Black Genesis — NFT Mint</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 20px; padding: 28px 24px; width: 340px; border: 1px solid #e5e5e5; }
  .nft-img { width: 100%; aspect-ratio: 1; border-radius: 12px; background: #000; margin-bottom: 20px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 16px; }
  .row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #f0f0f0; font-size: 14px; }
  .row-label { color: #888; }
  .row-val { font-weight: 600; }
  .wallet-box { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border: 1px solid #e5e5e5; border-radius: 10px; margin: 16px 0; cursor: pointer; font-size: 13px; background: #fafafa; }
  .wallet-box:hover { background: #f0f0f0; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.on { background: #22c55e; }
  .addr { flex: 1; color: #555; }
  .mint-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #000; color: white; font-size: 15px; font-weight: 600; cursor: pointer; }
  .mint-btn:disabled { background: #e5e5e5; color: #aaa; cursor: default; }
  .mint-btn:hover:not(:disabled) { background: #222; }
  .status { font-size: 12px; color: #aaa; text-align: center; margin-top: 10px; min-height: 18px; }
  .success { display: none; font-size: 13px; color: #16a34a; text-align: center; margin-top: 10px; }
  .error { display: none; font-size: 12px; color: #dc2626; text-align: center; margin-top: 10px; word-break: break-word; }
  .tx-link { display: none; font-size: 12px; text-align: center; margin-top: 8px; }
  .tx-link a { color: #0052FF; }
</style>
</head>
<body>
<div class="card">
  <div class="nft-img"></div>
  <h1>Black Genesis</h1>
  <p class="sub">Base Mainnet — ERC-1155</p>
  <div class="row"><span class="row-label">Fiyat</span><span class="row-val">0.0000001 ETH</span></div>
  <div class="row"><span class="row-label">Mint edilen</span><span class="row-val" id="minted">...</span></div>
  <div class="row"><span class="row-label">Network</span><span class="row-val">Base Mainnet</span></div>
  <div class="wallet-box" onclick="connectWallet()">
    <div class="dot" id="dot"></div>
    <span class="addr" id="addr">MetaMask bağla</span>
    <span>🦊</span>
  </div>
  <button class="mint-btn" id="mint-btn" disabled onclick="mintNFT()">Mint et</button>
  <div class="status" id="status">Cüzdanını bağla</div>
  <div class="success" id="success">✅ Mint başarılı!</div>
  <div class="error" id="error"></div>
  <div class="tx-link" id="tx-link"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script>
const CONTRACT = "0x57BBe1233CDE41C3eBcadF71B64c66f49D5E36D2";
const TOKEN_ID = 0;
const BASE_CHAIN_ID = 8453;
const BASE_RPC = "https://mainnet.base.org";
const ZERO = "0x0000000000000000000000000000000000000000";
const PRICE = ethers.utils.parseEther("0.0000001");

const ABI = [
  "function claim(address receiver, uint256 tokenId, uint256 quantity, address currency, uint256 pricePerToken, (bytes32[] proof, uint256 quantityLimitPerWallet, uint256 pricePerToken, address currency) allowlistProof, bytes data) external payable",
  "function totalSupply(uint256 tokenId) external view returns (uint256)"
];

let provider, signer, userAddress;

async function loadInfo() {
  try {
    const rpc = new ethers.providers.JsonRpcProvider(BASE_RPC);
    const contract = new ethers.Contract(CONTRACT, ABI, rpc);
    const supply = await contract.totalSupply(TOKEN_ID);
    document.getElementById('minted').textContent = supply.toString();
  } catch(e) {
    document.getElementById('minted').textContent = "—";
  }
}

async function connectWallet() {
  if (!window.ethereum) { alert("MetaMask yüklü değil!"); return; }
  try {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const network = await provider.getNetwork();
    if (network.chainId !== BASE_CHAIN_ID) {
      try {
        await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x2105" }] });
      } catch(e) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{ chainId: "0x2105", chainName: "Base", rpcUrls: ["https://mainnet.base.org"], nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 }, blockExplorerUrls: ["https://basescan.org"] }]
        });
      }
      provider = new ethers.providers.Web3Provider(window.ethereum);
    }
    signer = provider.getSigner();
    userAddress = await signer.getAddress();
    document.getElementById('addr').textContent = userAddress.slice(0,6) + "..." + userAddress.slice(-4);
    document.getElementById('dot').classList.add('on');
    document.getElementById('mint-btn').disabled = false;
    document.getElementById('status').textContent = "Base mainnet — hazır";
  } catch(e) {
    document.getElementById('status').textContent = "Bağlantı başarısız";
  }
}

async function mintNFT() {
  if (!signer) return;
  const btn = document.getElementById('mint-btn');
  const status = document.getElementById('status');
  const successEl = document.getElementById('success');
  const errorEl = document.getElementById('error');
  const txLink = document.getElementById('tx-link');

  btn.disabled = true;
  btn.textContent = "Onay bekleniyor...";
  status.textContent = "MetaMask'ta onayla";
  successEl.style.display = 'none';
  errorEl.style.display = 'none';
  txLink.style.display = 'none';

  try {
    const contract = new ethers.Contract(CONTRACT, ABI, signer);
    const priceInWei = 100;
    const tx = await contract.claim(
      userAddress, TOKEN_ID, 1, ZERO, priceInWei,
      { proof: [], quantityLimitPerWallet: 0, pricePerToken: priceInWei, currency: ZERO },
      "0x",
      { value: PRICE }
    );
    btn.textContent = "İşlem gönderildi...";
    status.textContent = "Blok onaylanıyor...";
    await tx.wait();
    btn.textContent = "Mint et";
    btn.disabled = false;
    successEl.style.display = 'block';
    status.textContent = "Base mainnet — hazır";
    txLink.style.display = 'block';
    txLink.innerHTML = '<a href="https://basescan.org/tx/' + tx.hash + '" target="_blank">Basescan\'de gör →</a>';
  } catch(e) {
    btn.textContent = "Mint et";
    btn.disabled = false;
    errorEl.style.display = 'block';
    errorEl.textContent = "Hata: " + (e.reason || e.data?.message || e.message || "İşlem reddedildi");
    status.textContent = "Tekrar dene";
  }
}

loadInfo();
</script>
</body>
</html>
